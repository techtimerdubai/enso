<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1b1f" />
  <meta name="description" content="無限紙 Mugengami — a free, infinite-canvas drawing & notes app for web and Android. Draw, sketch and think without edges." />
  <title>無限紙 · Mugengami — Endless Paper</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="paper"></canvas>

  <!-- Top-left brand -->
  <div id="brand" class="glass">
    <span class="jp">無限紙</span>
    <span class="romaji">Mugengami</span>
  </div>

  <!-- Zoom / position readout -->
  <div id="hud" class="glass" title="Zoom level — scroll or pinch to zoom">100%</div>

  <!-- Main toolbar -->
  <div id="toolbar" class="glass">
    <button class="tool active" data-tool="pen" title="Pen (P)">
      <svg viewBox="0 0 24 24"><path d="M3 21l3.8-.9L20.5 6.4a2 2 0 0 0 0-2.8l-.1-.1a2 2 0 0 0-2.8 0L3.9 17.2 3 21z"/></svg>
    </button>
    <button class="tool" data-tool="marker" title="Highlighter (M)">
      <svg viewBox="0 0 24 24"><path d="M4 20h16M6 16l8.5-8.5 3 3L9 19l-4 1 1-4z"/></svg>
    </button>
    <button class="tool" data-tool="eraser" title="Eraser (E)">
      <svg viewBox="0 0 24 24"><path d="M4 15l7-7 6 6-4 4H8l-4-3zM14 8l4 4"/></svg>
    </button>
    <button class="tool" data-tool="pan" title="Pan / Hand (H or hold Space)">
      <svg viewBox="0 0 24 24"><path d="M9 11V5.5a1.5 1.5 0 0 1 3 0V11m0-1.5a1.5 1.5 0 0 1 3 0V13m0-1.5a1.5 1.5 0 0 1 3 0V16a5 5 0 0 1-5 5h-2.2a4 4 0 0 1-3-1.4L6 16.5a1.5 1.5 0 0 1 2.2-2L9 15.3"/></svg>
    </button>

    <span class="sep"></span>

    <div id="swatches"></div>

    <span class="sep"></span>

    <label id="size" title="Brush size">
      <input type="range" min="1" max="48" value="4" id="sizeRange" />
    </label>

    <span class="sep"></span>

    <button id="undo" title="Undo (Ctrl+Z)">
      <svg viewBox="0 0 24 24"><path d="M9 7L4 12l5 5M4 12h11a5 5 0 0 1 0 10h-1"/></svg>
    </button>
    <button id="redo" title="Redo (Ctrl+Shift+Z)">
      <svg viewBox="0 0 24 24"><path d="M15 7l5 5-5 5M20 12H9a5 5 0 0 0 0 10h1"/></svg>
    </button>
  </div>

  <!-- Always-visible overflow button (kept outside the scrollable toolbar) -->
  <button id="menuBtn" class="glass" title="More">
    <svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
  </button>

  <!-- Overflow menu -->
  <div id="menu" class="glass hidden">
    <button data-act="home">↺  Recenter view</button>
    <button data-act="theme">◐  Toggle paper</button>
    <button data-act="grid">▦  Toggle grid</button>
    <button data-act="export">⬇  Export PNG</button>
    <button data-act="clear">🗑  Clear canvas</button>
    <a href="https://github.com/techtimerdubai/mugengami" target="_blank" rel="noopener">★  Source on GitHub</a>
  </div>

  <div id="hint">Draw anywhere · scroll or pinch to zoom · hold <kbd>Space</kbd> or two fingers to pan</div>

  <script src="app.js"></script>
</body>
</html>
